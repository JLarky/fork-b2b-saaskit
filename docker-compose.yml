services:
  postgres-test:
    image: postgres:16-alpine
    ports:
      - '54321:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: b2bsaaskit_test
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d b2bsaaskit_test']
      interval: 2s
      timeout: 5s
      retries: 15
