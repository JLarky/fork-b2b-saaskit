jobs:
  oxfmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout actions
        uses: actions/checkout@v3
      - name: Prepare actions
        uses: ./.github/actions/prepare
      - name: Oxfmt
        run: npx oxfmt --check .
      - uses: mshick/add-pr-comment@v2
        if: failure()
        with:
          message-failure: |
            Uh oh! Oxfmt found some formatting issues. Please run `yarn fix` and commit the changes.

name: Oxfmt

on:
  pull_request: ~
  merge_group: ~

  push:
    branches:
      - main
