jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4
      - name: Prepare actions
        uses: ./.github/actions/prepare
      - name: Sync astro
        run: pnpm astro sync
      - name: Type Checking
        run: pnpm ci:check
      - uses: mshick/add-pr-comment@v2
        if: failure()
        with:
          message-failure: |
            Uh oh! TypeScript found some issues. Please confirm it's fixed with `pnpm ci:check`.

name: TypeScript Check

on:
  pull_request: ~
  merge_group: ~

  push:
    branches:
      - main
