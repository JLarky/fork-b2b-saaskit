jobs:
  generated-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout actions
        uses: actions/checkout@v3
      - name: Prepare actions
        uses: ./.github/actions/prepare
      - name: Regenerate varlock types
        run: npx varlock typegen
      - name: Check for manual edits
        run: |
          if ! git diff --exit-code src/varlock-env.d.ts; then
            echo ""
            echo "ERROR: src/varlock-env.d.ts does not match what varlock typegen produces."
            echo "This file is autogenerated — do not edit it manually."
            echo "If you changed .env.schema, run: npx varlock typegen"
            exit 1
          fi

name: Generated Files Check

on:
  pull_request: ~
  merge_group: ~

  push:
    branches:
      - main
