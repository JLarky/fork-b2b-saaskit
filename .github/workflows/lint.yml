jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout actions
        uses: actions/checkout@v4
      - name: Prepare actions
        uses: ./.github/actions/prepare
      - name: Linting
        run: pnpm lint
      - uses: mshick/add-pr-comment@v2
        if: failure()
        with:
          message-failure: |
            Uh oh! Oxlint found some issues. Please run `pnpm fix` and commit the changes.

name: Lint

on:
  pull_request: ~
  merge_group: ~

  push:
    branches:
      - main
