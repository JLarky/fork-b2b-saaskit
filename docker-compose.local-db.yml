services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: b2bsaaskit
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d b2bsaaskit']
      interval: 2s
      timeout: 5s
      retries: 15
    ports:
      - '54322:5432'
    volumes:
      - local_postgres_data:/var/lib/postgresql/data
      - ./docker/local-postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  local_postgres_data:
